        if(navigator.canShare){
          const blob = new Blob([_csvData], {type:"text/csv;charset=utf-8"});
          const file = new File([blob], _csvFname, {type:"text/csv"});
          if(navigator.canShare({files:[file]})){
            await navigator.share({files:[file], title:"HPP Jaya Berkah"});
            return;
          }
        }
        // Fallback: share as text
        if(navigator.share){
          await navigator.share({title:"HPP Jaya Berkah", text: document.getElementById('export-ta').value});
          return;
        }
        alert("Share tidak tersedia. Gunakan tombol Copy.");
      } catch(e){ console.log(e); }
    };
  }
};
</script>
</body>
</html>
